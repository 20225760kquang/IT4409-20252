<!--Google clone HTML-->
<html>
    <head>
        <meta charset="UTF-8">
        <title>Google</title>
    </head>
    <body style="margin: 0; font-family: Arial, sans-serif; background: #fff;">

        <!-- Top nav -->
        <div style="display: flex; justify-content: flex-end; align-items: center; padding: 12px 20px; gap: 16px;">
            <a href="#" style="text-decoration: none; color: #202124; font-size: 14px;">Gmail</a>
            <a href="#" style="text-decoration: none; color: #202124; font-size: 14px;">Hình ảnh</a>
            <div style="width: 36px; height: 36px; border-radius: 50%; background-color: #6d4c41; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">Q</div>
        </div>

        <!-- Main content -->
        <div style="display: flex; flex-direction: column; align-items: center; margin-top: 120px;">

            <!-- Google logo -->
            <div style="font-size: 72px; font-weight: bold; margin-bottom: 28px; letter-spacing: -2px;">
                <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
            </div>

            <!-- Search bar -->
            <div style="display: flex; align-items: center; width: 580px; height: 46px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 14px; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <img src="img/plus.png" style="width: 18px; height: 18px; cursor: pointer; opacity: 0.6;">
                <input type="text" style="flex: 1; border: none; outline: none; font-size: 16px; background: transparent;">
                <img src="img/keyboard.png" style="width: 22px; height: 22px; cursor: pointer; opacity: 0.6;">
                <img src="img/voice-search.png" style="width: 22px; height: 22px; cursor: pointer; opacity: 0.6;">
                <img src="img/image.png" style="width: 22px; height: 22px; cursor: pointer; opacity: 0.6;">
                <span style="display: flex; align-items: center; gap: 4px; font-size: 14px; color: #202124; cursor: pointer; border-left: 1px solid #dfe1e5; padding-left: 10px;">
                    <img src="img/loupe.png" style="width: 16px; height: 16px; opacity: 0.6;">
                    Chế độ AI
                </span>
            </div>

            <!-- Buttons -->
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button style="padding: 10px 20px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 24px; font-size: 14px; color: #202124; cursor: pointer;">Tìm trên Google</button>
                <button style="padding: 10px 20px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 24px; font-size: 14px; color: #202124; cursor: pointer;">Xem trang đầu tiên tìm được</button>
            </div>

            <!-- Language -->
            <div style="margin-top: 28px; font-size: 14px; color: #202124;">
                Google hỗ trợ các ngôn ngữ:
                <a href="#" style="color: #1a0dab; text-decoration: none; margin-left: 4px;">English</a>
                <a href="#" style="color: #1a0dab; text-decoration: none; margin-left: 4px;">Français</a>
                <a href="#" style="color: #1a0dab; text-decoration: none; margin-left: 4px;">繁體中文</a>
            </div>
        </div>
    </body>
</html>
